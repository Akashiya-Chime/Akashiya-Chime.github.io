<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;h2 id=&#34;metro-last-light-redux&#34;&gt;《Metro: Last Light Redux》&lt;/h2&gt;
&lt;blockquote&gt;
&lt;p&gt;《&lt;a href=&#34;https://baike.baidu.com/item/%E5%9C%B0%E9%93%81%EF%BC%9A%E6%9C%80%E5%90%8E%E7%9A%84%E6%9B%99%E5%85%89/10953233?fr=aladdin&#34;&gt;地铁：最后的曙光重制版&lt;/a&gt;》（也就是地铁2034，至于重置和原版有啥区别，没玩过原版）&lt;/p&gt;
&lt;/blockquote&gt;
&lt;p&gt;&lt;em&gt;应该是放假不多久玩到的游戏，具体原因是 Epic 白给😁。放假前（期末考试期间）玩过&lt;a href=&#34;https://baike.baidu.com/item/%E5%9C%B0%E9%93%812033/12022172?fr=aladdin&#34;&gt;《Metro 2033 Redux》&lt;/a&gt;（其实也是 Epic 白给才玩到的），感觉还不错，能白piao续作还是很开心的&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;地铁系列，包括2033，归来和离去三部（听说归来是2033重置和最后的曙光的大包），4A家的废土（末世？）题材的FPS，改编自小说《地铁2033》《地铁2034》，故事背景简单说是核战争之后的世界（又是核平的一天呢）。类似题材的废土，就有育碧家的《辐射》系列了，核战争确实是个值得思考的背景。另外这个游戏的背景比较有意思的是，故事发生在俄罗斯，少有的可以在毛子的国家打枪，体验废土下毛子风土人情的游戏。关于这游戏的背景，还有一个趣闻（不知道是真是假），听说好莱坞拿到了电影翻拍权，但是觉得应该把故事发生的国家改在美利坚，但受到作者强烈反对，认为这样的故事在美国根本不可能发生（倒也确实），后面就破裂了，听说现在还在寻找合适的合作。&lt;/p&gt;
&lt;p style=&#34;color: red; font-weight:bold&#34;&gt;以下内容涉及部分剧透，请酌情观看&lt;/p&gt;
&lt;p&gt;由于是 Epic 平台下玩的，官方没有中文，补丁找到的 Steam 版的，但是不适用，讲究玩着英语版的，其实不是很难理解游戏剧情与游玩（雾，操着六级刚过的英语水平），当然，原汁原味还是应该选毛语，但是听不懂看不懂字幕就很难受了。值得一说，虽然选的英语，但是毛式英语听着也别有一种乐趣与体验。&lt;/p&gt;
&lt;p&gt;说是有剧透，但其实我也没太关注剧情，之前想买小说看看的但是有网友评论说官方中文的翻译有点难受（联想到了之前看《克苏鲁神话》），所以就没下决心。《最后的曙光》的剧情是延续之前《2033》的，前作里面移居地铁的人们受到一种被称作 the Dark Ones 的生物袭击，致使生存再次受到威胁，主角 Artyom 一路前往地铁中心 Polis，并在最后登上高塔，定向导弹，来了波偷家。这部著作就延续在一年后，依我看这一部有两条线索，一个是发现 the little Dark Ones，并找回起同伴；另一条是纳粹和红军的斗争。故事最后救回了 the little Dark Ones 的同伴，主角也在红军和纳粹的斗争中，最后在 D6 引爆炸弹同归于尽。但是听说本作和前作一样有两个结局（什么？有俩结局？2033也有俩？），但没具体调查过真假，也就不作过多阐述。&lt;/p&gt;
&lt;p&gt;游戏体验上还是挺不错的，有很多细节的东西。枪械方面虽然种类不是很多，但是配备了武器改装（虽然也不是很多就是了）。除了一些常规的枪械，比较特别的就是两类特有的，一种通过压缩气体射飞镖，另一种通过电磁射钢珠，这两种武器不仅需要上子弹（捡到子弹少的可怜，携带也少），还需要手摇来压缩气体或者充电，威力还行，特点是声响小。关于武器还有俩可以一谈的，一个是虽然有近战小刀，但是设计者并不觉得你可以拿它打架，伤害低的可怜（刮痧），主要作用是拿来做一些场景交互和 QTE（怪扑身上拿刀捅）；另一个是，这游戏的货币是军用子弹······这带来一个什么效果呢，我经常在给我 AK 上子弹的时候会装错（长按 R），然后就是打的钱啊😭，不过金钱的力量确实强，甚至还能带来燃烧效果😂。&lt;/p&gt;
&lt;p&gt;游戏里有两种敌人，一种是“人”，一种是一群长的像大狗的怪物（怪物还分很多种，根据毛色和体型分别，虽然我觉得都很像就是了），这一部里面还多了点水里游的，会钻出来打你，还很肉。说起这个游戏打怪，就不得不说，我觉得这就是个恐怖游戏，打人特别简单，这游戏人的AI比较傻，甚至能当个刺客（战士信条真好玩），拿飞刀一个一个解决（或者小刀背刺）。但是怪物可太难了，主要是剧情大多在地下，很阴间，靠着个忽明忽暗的手电（这里值得一提的是，游戏中的光源是需要手摇发电的，另外还有个打火机可以照明，因为有的地方电子器械被干扰了还黑的很，不得不点个打火机，另外打火机还可以烧蜘蛛网，点火把），虽然后面可能捡到夜视仪，但夜视仪也很阴间，然后那个怪啊就像恐怖游戏里的 jump scare，突然就跳出来，还一堆，移动速度还快，攻击速度更快，频率也高，有的关卡甚至有从洞里面爬出来给你一下就跑的，着实阴间恐游。&lt;/p&gt;
&lt;p&gt;游戏有个和废土有关的特色就是面罩。虽然大多数时候是在地铁中活动，但是也时不时会上到地面（这部里面见到了克里姆林宫，虽然我没仔细看）。因为背景是核战争之后，地面上辐射很重（空气有毒？），需要戴个防护面罩（面罩可能会被血液或者泥土弄脏影响视野，设计者“贴心”的设计了一个“擦面罩”的功能），需要过一段时间换个滤嘴。在玩前作的时候，一直不知道怎么看自己滤嘴还能撑多久，只能根据一些反馈来做判断（快完的时候会提示按“T”更换滤嘴，再过一段时间会听到主角在喘气），但是前作开始的时候滤嘴还很多，我甚至觉得这只是个装饰，没实用，就一直戴着，甚至在地下的时候也不摘，后面卡关卡了半天（恨不得 NPC 说话快点）。&lt;/p&gt;
&lt;p&gt;以上就是这个我游戏体验的大概了，还有很多剧情、场景、玩法上的细节就不多阐述&lt;/p&gt;
&lt;h2 id=&#34;for-the-king&#34;&gt;《For The King》&lt;/h2&gt;
&lt;blockquote&gt;
&lt;p&gt;《&lt;a href=&#34;https://baike.baidu.com/item/%E4%B8%BA%E4%BA%86%E5%9B%BD%E7%8E%8B/21791817?fr=aladdin&#34;&gt;为了吾王&lt;/a&gt;》&lt;/p&gt;
&lt;/blockquote&gt;
&lt;p&gt;也是 Epic 上白piao到的游戏，其实很早之前就已经领到了，并且和朋友联机玩过一段时间，但一直没通关，这次 Epic 梅开二度又送了一回，刚好让兄弟领了一起快乐一下。联机了几次，最终没能一起通关，前两天我又自己重开一个单人的服，花了一晚上多一点的时间终于通关了一次。&lt;/p&gt;
&lt;p&gt;这是一部具有龙与地下城（D&amp;amp;D）风格（现在叫Roguelike？）的游戏，三人回合制，有熟悉的属性机制和概率判定，难度和游戏体验还是可以的，但不得不说 Epic 送游戏不送服务器这个问题，玩个对延迟要求不是很高的 RPG 都要挂加速器。不过作为一个跑团爱好者，这个游戏还是很能满足我的胃口的。&lt;/p&gt;
&lt;p&gt;我只通关了基本的模式，还有几个模式没有过多去体验，等有想法的时候再说。&lt;/p&gt;
&lt;h2 id=&#34;unsere-mütter-unsere-väter&#34;&gt;《Unsere Mütter, unsere Väter》&lt;/h2&gt;
&lt;blockquote&gt;
&lt;p&gt;《我们的父辈》（&lt;a href=&#34;https://baike.baidu.com/item/%E6%88%91%E4%BB%AC%E7%9A%84%E7%88%B6%E8%BE%88/1323781?fr=aladdin&#34;&gt;百科&lt;/a&gt;）（&lt;a href=&#34;https://movie.douban.com/subject/22623816/&#34;&gt;豆瓣&lt;/a&gt;）&lt;/p&gt;
&lt;/blockquote&gt;
&lt;p&gt;&lt;em&gt;我说是电影，但百科给我说是迷你剧😂。了解到这部作品的原因是因为上上上学期，选了个德语二外的课，然后老师拿了两讲课作为拓展给我们放这个作品，当时没看完，这个假期陪家人过年一起看补完了（感谢朋友的b站大会员）。&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;故事背景是在二战，本作是站在德国的五个青年人的角度看待的这场战争，也是围绕着这五个朋友（Fünf freunde）在这场战争中所扮演的角色来引发观众的思考。其中不乏有看到诸如“水晶之夜”、“莫斯科保卫战”等历史事件的背后，以及“歧视犹太人”的现象。看完之后感触挺大的，我对历史的兴趣不是很大，但这部作品确实让我看到历史发人深省的地方，印象最深的也是本作主题的一句话：“战争只会把我们最坏的一面展现出来。”&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;《我们的父辈》给予至今幸存的德国二战一代，向他们亲人讲述自己二战故事的机会。&lt;em&gt;（《法兰克福汇报》评 ）&lt;/em&gt;&lt;/p&gt;
&lt;/blockquote&gt;
&lt;p&gt;&lt;em&gt;另外，作品中的德语歌《&lt;a href=&#34;https://www.bilibili.com/video/BV1w7411m7Ru&#34;&gt;Mein kleines Herz&lt;/a&gt;》还挺好听的&lt;/em&gt;&lt;/p&gt;
&lt;h2 id=&#34;琐碎给自己看的&#34;&gt;琐碎（给自己看的）&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;放假前计划继续进行的一个 PC 端阅读器 &lt;a href=&#34;https://github.com/Akashiya-Chime/Neko-Reader&#34;&gt;Neko-Reader&lt;/a&gt; 一点也没有动过😓，还不知道啥时候能动呢（所以 CSS 什么时候学？）&lt;/li&gt;
&lt;li&gt;因为计划考个软件工程，所以买了本《计算机网络》，应用层看完了，运输层看了点，基本都是年前看的，年后因为陪家人、到处拜年、和朋友玩（快找点理由），所以基本没看，这书还有个 2/3 的样子吧，下学期课多，还有另一门专业课《软件工程》没看，不知道得不得行啊这考研。&lt;/li&gt;
&lt;li&gt;做了个 DM 帷幕，材料是 pp 板和螺栓（螺栓买少了，导致打了洞没钉，不过还是稳的），说起螺栓，还有门钢结构设计原理要补考，啥时候复习呢。&lt;/li&gt;
&lt;li&gt;C 语言学到指针了，前边基本都是复习，因为有过《计算机程序设计基础》的课，学起来给我的感受就是，很繁琐，有各种各样的问题（还是 JavaScript、Python这种简单的适合我），但是考研要复试，那我的优势在哪呢？&lt;/li&gt;
&lt;li&gt;因为 Edge 更新不了，尝试更新 win10 失败，导致重装了一次系统，花了大概两天时间恢复到 95% 大概可以使用。&lt;/li&gt;

      <div class="item">
        <a class="result-title" href="https://akashiya-chime.github.io/post/webpack/"" data-c="
          &lt;p&gt;之前为了学习 Vue2 而去学了点 webpack 的基础，然而现在尤大发布 vue3 之后自己整了一个 vite，那这不得不去再学 vite&lt;/p&gt;
&lt;p&gt;&lt;em&gt;文章放 CSDN 上了：&lt;/em&gt;&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;&lt;a href=&#34;https://blog.csdn.net/Akashiyachime/article/details/106841056&#34;&gt;https://blog.csdn.net/Akashiyachime/article/details/106841056&lt;/a&gt;&lt;/p&gt;
&lt;/blockquote&gt;
&lt;!-- more --&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;前端资源构建工具，静态模块打包器&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;坑：&lt;/p&gt;
&lt;p&gt;如果你webpack和webpack-cli是局部安装的，想要使用webpack命令必须进入node_modules/.bin/webpack才能执行webpack命令，.bin目录包含的是一系列可以执行的命令，但是如果你是全局安装的webpack-cli，就不需要进入bin目录，webpack就能够寻找到它的命令路径了，以上是我的个人总结&lt;br&gt;
（所以说啥本地安装啊，还是安全局的吧。。。）&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;核心概念&#34;&gt;核心概念&lt;/h2&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;Entry&lt;/th&gt;
&lt;th&gt;入口(Entry)指示Webpack以哪个文件为入口起点开始打包，分析构建内部依赖图&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;Output&lt;/td&gt;
&lt;td&gt;输出(Output)指示Webpack打包后的资源bundle输出到哪里去，以及如何命名&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Loader&lt;/td&gt;
&lt;td&gt;Loader让Webpack能够去处理哪些非JavaScript文件(Webpack自身只理解JavaScript)&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Plugins&lt;/td&gt;
&lt;td&gt;插件(Plugins)可以用于执行范围更广的任务。插件范围包括，从打包优化和压缩，一直到重新定义环境中的变量等&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td&gt;Mode&lt;/td&gt;
&lt;td&gt;模式(Mode)指示Webpack使用相应的模式的配置&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;h2 id=&#34;流程&#34;&gt;流程&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;index.js： Webpack 入口起点文件&lt;/li&gt;
&lt;/ul&gt;
&lt;ol&gt;
&lt;li&gt;运行指令：&lt;br&gt;
开发环境：&lt;code&gt;webpack ./src/index.js -o ./build/built.js --mode=development&lt;/code&gt;&lt;br&gt;
webpack 会以 &lt;code&gt;./src/index.js&lt;/code&gt; 为入口文件开始打包，打包后输出到 &lt;code&gt;.build/built.js&lt;/code&gt;&lt;br&gt;
整体打包环境是 开发环境&lt;br&gt;
生产环境：&lt;code&gt;webpack ./src/index.js -o ./build/built.js --mode=production&lt;/code&gt;&lt;/li&gt;
&lt;li&gt;结论：&lt;br&gt;
（1）webpack 能处理 &lt;code&gt;js/json&lt;/code&gt; 资源，不能处理 &lt;code&gt;css/img&lt;/code&gt; 等资源&lt;br&gt;
（2）生产环境和开发环境将 ES6 模块化编译成浏览器能识别的模块化&lt;br&gt;
（3）生产环境比开发环境多一个压缩 &lt;code&gt;js&lt;/code&gt; 代码&lt;/li&gt;
&lt;/ol&gt;
&lt;h2 id=&#34;打包样式资源&#34;&gt;打包样式资源&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;src 同级目录下创建 &lt;code&gt;webpack.config.js&lt;/code&gt; 文件，该文件是 webpack 的配置文件&lt;br&gt;
作用：指示 webpack 工作（运行 webpack 指令时，会加载里面的配置）&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;所有构建工具都是基于 node.js 平台运行，模块化默认采用 commonjs&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-javascript&#34;&gt;// resolve 用来拼接绝对路径的方法
const { resolve } = require(&#39;path&#39;)

module.exports = {
    // webpake 配置
    // 入口起点
    entry: &#39;./src/index.js&#39;,
    // 输出
    output: {
        // 输出文件名
        filename: &#39;built.js&#39;,
        // 输出路径
        // __dirname 是 node.js 的变量，代表当前文件的目录绝对路径
        path: resolve(__dirname, &#39;build&#39;)
    },
    // loader 的配置
    module: {
        rules: [
            // 详细的 loader 配置
            // 不同文件必须配置不同的 loader 处理
            {
                // 匹配哪些文件
                test: /\.css$/,
                // 使用哪些 loader 进行处理
                // 当要使用多个 loader 时，需用 use: []
                use: [
                    // use 数组中 loader 执行顺序：从后到前，依次执行
                    // 创建 style 标签，将 js 中的样式资源插入进去，添加到&amp;lt;header&amp;gt;中生效
                    &#39;style-loader&#39;,  //后执行
                    // 将 css 文件变成 commonjs 模块加载 js 中，里面内容是样式字符串
                    &#39;css-loader&#39;  //先执行
                ]
            }
        ]
    },
    // plugins 的配置
    plugins: [
        // 详细的 plugins 配置
    ],
    // 模式
    mode: &#39;development&#39;  // 开发模式
    // mode: &#39;production&#39;  //生产模式
}
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;打包html&#34;&gt;打包html&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;需要一个 plugin：&lt;code&gt;html-webpack-plugin&lt;/code&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code class=&#34;language-javascript&#34;&gt;const HtmlWebpackPlugin = require(&#39;html-webpack-plugin&#39;)

module.exports = {
    plugins: [
        // 默认创建空的 HTML，自动引入打包输出的所有资源（JS/CSS）
        // 需要有结构的 HTML
        new HtmlWebpackPlugin({
            // 复制 &#39;./src/index.html&#39; 文件，并自动引入打包输出的所有资源（JS/CSS）
            template: &#39;./src/index.html&#39;
        })
    ]
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;打包图片资源&#34;&gt;打包图片资源&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;需要一个 loader：&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code class=&#34;language-javascript&#34;&gt;module.exports = {
    module: {
        rules: [
            {
                // 问题：默认处理不了 html 中引入图片（可处理样式中的图片）
            	test: /\.(jpg|png|gif)$/,
            	// 当只有一个 loader 时，可直接loader:
            	loader: &#39;url-loader&#39;
            	option: {
            		// 图片大小小于 8kb ，就会被 base64 处理（一般 8~12kb）
            		// 优点：减少请求数量（减轻服务器压力）
            		// 缺点：图片体积会更大（文件请求速度更慢）
            		limit: 8 * 1024,  // 8kb
                	// 问题：因为 url-loader 默认使用 ES6 模块化解析
                	// 而 html-loader 引入图片是 commonjs
                	// 解析时会出问题：[object Module]
                	// 解决：关闭 url-loader 的 ES6 模块化，使用 commonjs解析
                	esModule: false,
                	// 给图片进行重命名
                	// [hash:10] 取图片的 hash 前10位
                	// [ext] 取文件原来的扩展名
                	name: &#39;[hash:10].[ext]&#39;
            	}
            },
            {
            	test: /\.html$/,
            	// 处理 html 文件的图片（引入 img，从而能被 url-loader 处理）
            	loader: &#39;html-loader&#39;
            }
        ]
    }
}
// 最终图片的名称是一个 hash 值
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;打包其他资源&#34;&gt;打包其他资源&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;一些不需要进行压缩等处理的文件&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code class=&#34;language-javascript&#34;&gt;module.exports = {
    module: {
        rules: [
            // 打包其他资源（除了 html/js/css 资源以外的资源）
            {
                // 排除
                exclude: /\.html|js|css$/,
                loader: &#39;file-loader&#39;
            }
        ]
    }
}
// 也是 hash 值（也可以用 options 处理一下）
&lt;/code&gt;&lt;/pre&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;混了一个假期，想想在假期里干了些啥，包括但不限于：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;《地铁最后的曙光》&lt;/li&gt;\n&lt;li&gt;《为了吾王》&lt;/li&gt;\n&lt;li&gt;《我们的父辈》&lt;/li&gt;\n&lt;/ul&gt;\n&lt;!-- more --&gt;\n&lt;h2 id=\&#34;metro-last-light-redux\&#34;&gt;《Metro: Last Light Redux》&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;《&lt;a href=\&#34;https://baike.baidu.com/item/%E5%9C%B0%E9%93%81%EF%BC%9A%E6%9C%80%E5%90%8E%E7%9A%84%E6%9B%99%E5%85%89/10953233?fr=aladdin\&#34;&gt;地铁：最后的曙光重制版&lt;/a&gt;》（也就是地铁2034，至于重置和原版有啥区别，没玩过原版）&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;em&gt;应该是放假不多久玩到的游戏，具体原因是 Epic 白给😁。放假前（期末考试期间）玩过&lt;a href=\&#34;https://baike.baidu.com/item/%E5%9C%B0%E9%93%812033/12022172?fr=aladdin\&#34;&gt;《Metro 2033 Redux》&lt;/a&gt;（其实也是 Epic 白给才玩到的），感觉还不错，能白piao续作还是很开心的&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;地铁系列，包括2033，归来和离去三部（听说归来是2033重置和最后的曙光的大包），4A家的废土（末世？）题材的FPS，改编自小说《地铁2033》《地铁2034》，故事背景简单说是核战争之后的世界（又是核平的一天呢）。类似题材的废土，就有育碧家的《辐射》系列了，核战争确实是个值得思考的背景。另外这个游戏的背景比较有意思的是，故事发生在俄罗斯，少有的可以在毛子的国家打枪，体验废土下毛子风土人情的游戏。关于这游戏的背景，还有一个趣闻（不知道是真是假），听说好莱坞拿到了电影翻拍权，但是觉得应该把故事发生的国家改在美利坚，但受到作者强烈反对，认为这样的故事在美国根本不可能发生（倒也确实），后面就破裂了，听说现在还在寻找合适的合作。&lt;/p&gt;\n&lt;p style=\&#34;color: red; font-weight:bold\&#34;&gt;以下内容涉及部分剧透，请酌情观看&lt;/p&gt;\n&lt;p&gt;由于是 Epic 平台下玩的，官方没有中文，补丁找到的 Steam 版的，但是不适用，讲究玩着英语版的，其实不是很难理解游戏剧情与游玩（雾，操着六级刚过的英语水平），当然，原汁原味还是应该选毛语，但是听不懂看不懂字幕就很难受了。值得一说，虽然选的英语，但是毛式英语听着也别有一种乐趣与体验。&lt;/p&gt;\n&lt;p&gt;说是有剧透，但其实我也没太关注剧情，之前想买小说看看的但是有网友评论说官方中文的翻译有点难受（联想到了之前看《克苏鲁神话》），所以就没下决心。《最后的曙光》的剧情是延续之前《2033》的，前作里面移居地铁的人们受到一种被称作 the Dark Ones 的生物袭击，致使生存再次受到威胁，主角 Artyom 一路前往地铁中心 Polis，并在最后登上高塔，定向导弹，来了波偷家。这部著作就延续在一年后，依我看这一部有两条线索，一个是发现 the little Dark Ones，并找回起同伴；另一条是纳粹和红军的斗争。故事最后救回了 the little Dark Ones 的同伴，主角也在红军和纳粹的斗争中，最后在 D6 引爆炸弹同归于尽。但是听说本作和前作一样有两个结局（什么？有俩结局？2033也有俩？），但没具体调查过真假，也就不作过多阐述。&lt;/p&gt;\n&lt;p&gt;游戏体验上还是挺不错的，有很多细节的东西。枪械方面虽然种类不是很多，但是配备了武器改装（虽然也不是很多就是了）。除了一些常规的枪械，比较特别的就是两类特有的，一种通过压缩气体射飞镖，另一种通过电磁射钢珠，这两种武器不仅需要上子弹（捡到子弹少的可怜，携带也少），还需要手摇来压缩气体或者充电，威力还行，特点是声响小。关于武器还有俩可以一谈的，一个是虽然有近战小刀，但是设计者并不觉得你可以拿它打架，伤害低的可怜（刮痧），主要作用是拿来做一些场景交互和 QTE（怪扑身上拿刀捅）；另一个是，这游戏的货币是军用子弹······这带来一个什么效果呢，我经常在给我 AK 上子弹的时候会装错（长按 R），然后就是打的钱啊😭，不过金钱的力量确实强，甚至还能带来燃烧效果😂。&lt;/p&gt;\n&lt;p&gt;游戏里有两种敌人，一种是“人”，一种是一群长的像大狗的怪物（怪物还分很多种，根据毛色和体型分别，虽然我觉得都很像就是了），这一部里面还多了点水里游的，会钻出来打你，还很肉。说起这个游戏打怪，就不得不说，我觉得这就是个恐怖游戏，打人特别简单，这游戏人的AI比较傻，甚至能当个刺客（战士信条真好玩），拿飞刀一个一个解决（或者小刀背刺）。但是怪物可太难了，主要是剧情大多在地下，很阴间，靠着个忽明忽暗的手电（这里值得一提的是，游戏中的光源是需要手摇发电的，另外还有个打火机可以照明，因为有的地方电子器械被干扰了还黑的很，不得不点个打火机，另外打火机还可以烧蜘蛛网，点火把），虽然后面可能捡到夜视仪，但夜视仪也很阴间，然后那个怪啊就像恐怖游戏里的 jump scare，突然就跳出来，还一堆，移动速度还快，攻击速度更快，频率也高，有的关卡甚至有从洞里面爬出来给你一下就跑的，着实阴间恐游。&lt;/p&gt;\n&lt;p&gt;游戏有个和废土有关的特色就是面罩。虽然大多数时候是在地铁中活动，但是也时不时会上到地面（这部里面见到了克里姆林宫，虽然我没仔细看）。因为背景是核战争之后，地面上辐射很重（空气有毒？），需要戴个防护面罩（面罩可能会被血液或者泥土弄脏影响视野，设计者“贴心”的设计了一个“擦面罩”的功能），需要过一段时间换个滤嘴。在玩前作的时候，一直不知道怎么看自己滤嘴还能撑多久，只能根据一些反馈来做判断（快完的时候会提示按“T”更换滤嘴，再过一段时间会听到主角在喘气），但是前作开始的时候滤嘴还很多，我甚至觉得这只是个装饰，没实用，就一直戴着，甚至在地下的时候也不摘，后面卡关卡了半天（恨不得 NPC 说话快点）。&lt;/p&gt;\n&lt;p&gt;以上就是这个我游戏体验的大概了，还有很多剧情、场景、玩法上的细节就不多阐述&lt;/p&gt;\n&lt;h2 id=\&#34;for-the-king\&#34;&gt;《For The King》&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;《&lt;a href=\&#34;https://baike.baidu.com/item/%E4%B8%BA%E4%BA%86%E5%9B%BD%E7%8E%8B/21791817?fr=aladdin\&#34;&gt;为了吾王&lt;/a&gt;》&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;也是 Epic 上白piao到的游戏，其实很早之前就已经领到了，并且和朋友联机玩过一段时间，但一直没通关，这次 Epic 梅开二度又送了一回，刚好让兄弟领了一起快乐一下。联机了几次，最终没能一起通关，前两天我又自己重开一个单人的服，花了一晚上多一点的时间终于通关了一次。&lt;/p&gt;\n&lt;p&gt;这是一部具有龙与地下城（D&amp;amp;D）风格（现在叫Roguelike？）的游戏，三人回合制，有熟悉的属性机制和概率判定，难度和游戏体验还是可以的，但不得不说 Epic 送游戏不送服务器这个问题，玩个对延迟要求不是很高的 RPG 都要挂加速器。不过作为一个跑团爱好者，这个游戏还是很能满足我的胃口的。&lt;/p&gt;\n&lt;p&gt;我只通关了基本的模式，还有几个模式没有过多去体验，等有想法的时候再说。&lt;/p&gt;\n&lt;h2 id=\&#34;unsere-mütter-unsere-väter\&#34;&gt;《Unsere Mütter, unsere Väter》&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;《我们的父辈》（&lt;a href=\&#34;https://baike.baidu.com/item/%E6%88%91%E4%BB%AC%E7%9A%84%E7%88%B6%E8%BE%88/1323781?fr=aladdin\&#34;&gt;百科&lt;/a&gt;）（&lt;a href=\&#34;https://movie.douban.com/subject/22623816/\&#34;&gt;豆瓣&lt;/a&gt;）&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;em&gt;我说是电影，但百科给我说是迷你剧😂。了解到这部作品的原因是因为上上上学期，选了个德语二外的课，然后老师拿了两讲课作为拓展给我们放这个作品，当时没看完，这个假期陪家人过年一起看补完了（感谢朋友的b站大会员）。&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;故事背景是在二战，本作是站在德国的五个青年人的角度看待的这场战争，也是围绕着这五个朋友（Fünf freunde）在这场战争中所扮演的角色来引发观众的思考。其中不乏有看到诸如“水晶之夜”、“莫斯科保卫战”等历史事件的背后，以及“歧视犹太人”的现象。看完之后感触挺大的，我对历史的兴趣不是很大，但这部作品确实让我看到历史发人深省的地方，印象最深的也是本作主题的一句话：“战争只会把我们最坏的一面展现出来。”&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;《我们的父辈》给予至今幸存的德国二战一代，向他们亲人讲述自己二战故事的机会。&lt;em&gt;（《法兰克福汇报》评 ）&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;em&gt;另外，作品中的德语歌《&lt;a href=\&#34;https://www.bilibili.com/video/BV1w7411m7Ru\&#34;&gt;Mein kleines Herz&lt;/a&gt;》还挺好听的&lt;/em&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;琐碎给自己看的\&#34;&gt;琐碎（给自己看的）&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;放假前计划继续进行的一个 PC 端阅读器 &lt;a href=\&#34;https://github.com/Akashiya-Chime/Neko-Reader\&#34;&gt;Neko-Reader&lt;/a&gt; 一点也没有动过😓，还不知道啥时候能动呢（所以 CSS 什么时候学？）&lt;/li&gt;\n&lt;li&gt;因为计划考个软件工程，所以买了本《计算机网络》，应用层看完了，运输层看了点，基本都是年前看的，年后因为陪家人、到处拜年、和朋友玩（快找点理由），所以基本没看，这书还有个 2/3 的样子吧，下学期课多，还有另一门专业课《软件工程》没看，不知道得不得行啊这考研。&lt;/li&gt;\n&lt;li&gt;做了个 DM 帷幕，材料是 pp 板和螺栓（螺栓买少了，导致打了洞没钉，不过还是稳的），说起螺栓，还有门钢结构设计原理要补考，啥时候复习呢。&lt;/li&gt;\n&lt;li&gt;C 语言学到指针了，前边基本都是复习，因为有过《计算机程序设计基础》的课，学起来给我的感受就是，很繁琐，有各种各样的问题（还是 JavaScript、Python这种简单的适合我），但是考研要复试，那我的优势在哪呢？&lt;/li&gt;\n&lt;li&gt;因为 Edge 更新不了，尝试更新 win10 失败，导致重装了一次系统，花了大概两天时间恢复到 95% 大概可以使用。&lt;/li&gt;\n&lt;li&gt;有了兴致 LOL 上了白银（潘森真好玩）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;后话\&#34;&gt;后话&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;想写个软件推荐，以上&lt;/p&gt;\n&lt;/blockquote&gt;\n&#34;,&#34;fileName&#34;:&#34;jia-qi-zong-jie&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;混了一个假期，想想在假期里干了些啥，包括但不限于：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;《地铁最后的曙光》&lt;/li&gt;\n&lt;li&gt;《为了吾王》&lt;/li&gt;\n&lt;li&gt;《我们的父辈》&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;title&#34;:&#34;假期总结&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Life&#34;,&#34;slug&#34;:&#34;sTY5nK2zz&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://akashiya-chime.github.io/tag/sTY5nK2zz/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Game&#34;,&#34;slug&#34;:&#34;tGh_i24GF&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://akashiya-chime.github.io/tag/tGh_i24GF/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Movie&#34;,&#34;slug&#34;:&#34;nVXimc5DV&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://akashiya-chime.github.io/tag/nVXimc5DV/&#34;}],&#34;date&#34;:&#34;2021-02-19 13:57:44&#34;,&#34;dateFormat&#34;:&#34;2021-02-19&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://akashiya-chime.github.io/post/jia-qi-zong-jie/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;10 min read&#34;,&#34;time&#34;:550000,&#34;words&#34;:2679,&#34;minutes&#34;:10},&#34;description&#34;:&#34;混了一个假期，想想在假期里干了些啥，包括但不限于：\n\n《地铁最后的曙光》\n《为了吾王》\n《我们的父辈》\n\n\n《Metro: Last Light Redux》\n\n《地铁：最后的曙光重制版》（也就是地铁2034，至于重置和原版有啥区别，没玩过...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#metro-last-light-redux\&#34;&gt;《Metro: Last Light Redux》&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#for-the-king\&#34;&gt;《For The King》&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#unsere-m%C3%BCtter-unsere-v%C3%A4ter\&#34;&gt;《Unsere Mütter, unsere Väter》&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%90%90%E7%A2%8E%E7%BB%99%E8%87%AA%E5%B7%B1%E7%9C%8B%E7%9A%84\&#34;&gt;琐碎（给自己看的）&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%90%8E%E8%AF%9D\&#34;&gt;后话&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;之前为了学习 Vue2 而去学了点 webpack 的基础，然而现在尤大发布 vue3 之后自己整了一个 vite，那这不得不去再学 vite&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;文章放 CSDN 上了：&lt;/em&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;a href=\&#34;https://blog.csdn.net/Akashiyachime/article/details/106841056\&#34;&gt;https://blog.csdn.net/Akashiyachime/article/details/106841056&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;!-- more --&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;前端资源构建工具，静态模块打包器&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;坑：&lt;/p&gt;\n&lt;p&gt;如果你webpack和webpack-cli是局部安装的，想要使用webpack命令必须进入node_modules/.bin/webpack才能执行webpack命令，.bin目录包含的是一系列可以执行的命令，但是如果你是全局安装的webpack-cli，就不需要进入bin目录，webpack就能够寻找到它的命令路径了，以上是我的个人总结&lt;br&gt;\n（所以说啥本地安装啊，还是安全局的吧。。。）&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;核心概念\&#34;&gt;核心概念&lt;/h2&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Entry&lt;/th&gt;\n&lt;th&gt;入口(Entry)指示Webpack以哪个文件为入口起点开始打包，分析构建内部依赖图&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;Output&lt;/td&gt;\n&lt;td&gt;输出(Output)指示Webpack打包后的资源bundle输出到哪里去，以及如何命名&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Loader&lt;/td&gt;\n&lt;td&gt;Loader让Webpack能够去处理哪些非JavaScript文件(Webpack自身只理解JavaScript)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Plugins&lt;/td&gt;\n&lt;td&gt;插件(Plugins)可以用于执行范围更广的任务。插件范围包括，从打包优化和压缩，一直到重新定义环境中的变量等&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Mode&lt;/td&gt;\n&lt;td&gt;模式(Mode)指示Webpack使用相应的模式的配置&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;h2 id=\&#34;流程\&#34;&gt;流程&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;index.js： Webpack 入口起点文件&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol&gt;\n&lt;li&gt;运行指令：&lt;br&gt;\n开发环境：&lt;code&gt;webpack ./src/index.js -o ./build/built.js --mode=development&lt;/code&gt;&lt;br&gt;\nwebpack 会以 &lt;code&gt;./src/index.js&lt;/code&gt; 为入口文件开始打包，打包后输出到 &lt;code&gt;.build/built.js&lt;/code&gt;&lt;br&gt;\n整体打包环境是 开发环境&lt;br&gt;\n生产环境：&lt;code&gt;webpack ./src/index.js -o ./build/built.js --mode=production&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;结论：&lt;br&gt;\n（1）webpack 能处理 &lt;code&gt;js/json&lt;/code&gt; 资源，不能处理 &lt;code&gt;css/img&lt;/code&gt; 等资源&lt;br&gt;\n（2）生产环境和开发环境将 ES6 模块化编译成浏览器能识别的模块化&lt;br&gt;\n（3）生产环境比开发环境多一个压缩 &lt;code&gt;js&lt;/code&gt; 代码&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&#34;打包样式资源\&#34;&gt;打包样式资源&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;src 同级目录下创建 &lt;code&gt;webpack.config.js&lt;/code&gt; 文件，该文件是 webpack 的配置文件&lt;br&gt;\n作用：指示 webpack 工作（运行 webpack 指令时，会加载里面的配置）&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;所有构建工具都是基于 node.js 平台运行，模块化默认采用 commonjs&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-javascript\&#34;&gt;// resolve 用来拼接绝对路径的方法\nconst { resolve } = require(&#39;path&#39;)\n\nmodule.exports = {\n    // webpake 配置\n    // 入口起点\n    entry: &#39;./src/index.js&#39;,\n    // 输出\n    output: {\n        // 输出文件名\n        filename: &#39;built.js&#39;,\n        // 输出路径\n        // __dirname 是 node.js 的变量，代表当前文件的目录绝对路径\n        path: resolve(__dirname, &#39;build&#39;)\n    },\n    // loader 的配置\n    module: {\n        rules: [\n            // 详细的 loader 配置\n            // 不同文件必须配置不同的 loader 处理\n            {\n                // 匹配哪些文件\n                test: /\\.css$/,\n                // 使用哪些 loader 进行处理\n                // 当要使用多个 loader 时，需用 use: []\n                use: [\n                    // use 数组中 loader 执行顺序：从后到前，依次执行\n                    // 创建 style 标签，将 js 中的样式资源插入进去，添加到&amp;lt;header&amp;gt;中生效\n                    &#39;style-loader&#39;,  //后执行\n                    // 将 css 文件变成 commonjs 模块加载 js 中，里面内容是样式字符串\n                    &#39;css-loader&#39;  //先执行\n                ]\n            }\n        ]\n    },\n    // plugins 的配置\n    plugins: [\n        // 详细的 plugins 配置\n    ],\n    // 模式\n    mode: &#39;development&#39;  // 开发模式\n    // mode: &#39;production&#39;  //生产模式\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;打包html\&#34;&gt;打包html&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;需要一个 plugin：&lt;code&gt;html-webpack-plugin&lt;/code&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-javascript\&#34;&gt;const HtmlWebpackPlugin = require(&#39;html-webpack-plugin&#39;)\n\nmodule.exports = {\n    plugins: [\n        // 默认创建空的 HTML，自动引入打包输出的所有资源（JS/CSS）\n        // 需要有结构的 HTML\n        new HtmlWebpackPlugin({\n            // 复制 &#39;./src/index.html&#39; 文件，并自动引入打包输出的所有资源（JS/CSS）\n            template: &#39;./src/index.html&#39;\n        })\n    ]\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;打包图片资源\&#34;&gt;打包图片资源&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;需要一个 loader：&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-javascript\&#34;&gt;module.exports = {\n    module: {\n        rules: [\n            {\n                // 问题：默认处理不了 html 中引入图片（可处理样式中的图片）\n            \ttest: /\\.(jpg|png|gif)$/,\n            \t// 当只有一个 loader 时，可直接loader:\n            \tloader: &#39;url-loader&#39;\n            \toption: {\n            \t\t// 图片大小小于 8kb ，就会被 base64 处理（一般 8~12kb）\n            \t\t// 优点：减少请求数量（减轻服务器压力）\n            \t\t// 缺点：图片体积会更大（文件请求速度更慢）\n            \t\tlimit: 8 * 1024,  // 8kb\n                \t// 问题：因为 url-loader 默认使用 ES6 模块化解析\n                \t// 而 html-loader 引入图片是 commonjs\n                \t// 解析时会出问题：[object Module]\n                \t// 解决：关闭 url-loader 的 ES6 模块化，使用 commonjs解析\n                \tesModule: false,\n                \t// 给图片进行重命名\n                \t// [hash:10] 取图片的 hash 前10位\n                \t// [ext] 取文件原来的扩展名\n                \tname: &#39;[hash:10].[ext]&#39;\n            \t}\n            },\n            {\n            \ttest: /\\.html$/,\n            \t// 处理 html 文件的图片（引入 img，从而能被 url-loader 处理）\n            \tloader: &#39;html-loader&#39;\n            }\n        ]\n    }\n}\n// 最终图片的名称是一个 hash 值\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;打包其他资源\&#34;&gt;打包其他资源&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;一些不需要进行压缩等处理的文件&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-javascript\&#34;&gt;module.exports = {\n    module: {\n        rules: [\n            // 打包其他资源（除了 html/js/css 资源以外的资源）\n            {\n                // 排除\n                exclude: /\\.html|js|css$/,\n                loader: &#39;file-loader&#39;\n            }\n        ]\n    }\n}\n// 也是 hash 值（也可以用 options 处理一下）\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;webpack&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;之前为了学习 Vue2 而去学了点 webpack 的基础，然而现在尤大发布 vue3 之后自己整了一个 vite，那这不得不去再学 vite&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;文章放 CSDN 上了：&lt;/em&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;a href=\&#34;https://blog.csdn.net/Akashiyachime/article/details/106841056\&#34;&gt;https://blog.csdn.net/Akashiyachime/article/details/106841056&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&#34;,&#34;title&#34;:&#34;Webpack打包基础&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-18 23:48:46&#34;,&#34;dateFormat&#34;:&#34;2021-02-18&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://akashiya-chime.github.io/post/webpack/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;5 min read&#34;,&#34;time&#34;:270000,&#34;words&#34;:1137,&#34;minutes&#34;:5},&#34;description&#34;:&#34;之前为了学习 Vue2 而去学了点 webpack 的基础，然而现在尤大发布 vue3 之后自己整了一个 vite，那这不得不去再学 vite\n文章放 CSDN 上了：\n\nhttps://blog.csdn.net/Akashiyachim...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A0%B8%E5%BF%83%E6%A6%82%E5%BF%B5\&#34;&gt;核心概念&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%81%E7%A8%8B\&#34;&gt;流程&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%89%93%E5%8C%85%E6%A0%B7%E5%BC%8F%E8%B5%84%E6%BA%90\&#34;&gt;打包样式资源&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%89%93%E5%8C%85html\&#34;&gt;打包html&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%89%93%E5%8C%85%E5%9B%BE%E7%89%87%E8%B5%84%E6%BA%90\&#34;&gt;打包图片资源&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%89%93%E5%8C%85%E5%85%B6%E4%BB%96%E8%B5%84%E6%BA%90\&#34;&gt;打包其他资源&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;}]";
